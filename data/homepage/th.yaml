hero:
  eyebrow: "Thamdee Ecosystem"
  headline: "ระบบนิเวศแห่งการเรียนรู้ เทคโนโลยี และสิ่งดี ๆ"
  subheadline: "Thamdee รวมแอปมือถือ ศูนย์ความรู้ และคอนเทนต์ที่เชื่อถือได้ไว้ในที่เดียว เพื่อครู ผู้บริหาร ผู้เรียน และทุกคนที่อยากใช้เทคโนโลยีอย่างมั่นใจและมีคุณค่า"
  cta_primary:
    label: "สำรวจ Ecosystem"
    url: "#ecosystem"
  cta_secondary:
    label: "ดูแอปของเรา"
