contact:
  eyebrow: "Contact & Feedback"
  heading: "คุยกับเราได้เสมอ"
  lead: "พบข้อผิดพลาดในเนื้อหา มีข้อเสนอแนะ หรืออยากร่วมงานกับ Thamdee เขียนมาหาเราได้เลย เราอ่านทุกข้อความ"
  email_label: "ส่งอีเมลถึงเรา"
  feedback_note: "การแจ้งข้อผิดพลาดของเนื้อหา โปรดระบุลิงก์ของหน้าและจุดที่พบ เพื่อให้เราตรวจสอบและแก้ไขได้เร็วขึ้น"

founder:
  eyebrow: "ผู้จัดทำ"
  heading: "เบื้องหลัง Thamdee"
  name: "Boorapatis Ploysuwan"  # หากต้องการแสดงชื่อภาษาไทย แก้ค่านี้ได้เลย
  role_line: "นักการศึกษาและผู้จัดทำ Thamdee Ecosystem"
  initials: "BP"
  education: "ศึกษาด้านการศึกษา โสตทัศนศึกษา และการบริหารการศึกษา"
  experience_intro: "ทำงานในแวดวงการศึกษาและการเรียนรู้มาอย่างต่อเนื่อง ตั้งแต่ระดับห้องเรียนจนถึงระดับองค์กร ได้แก่"
  roles:
    - "ครูผู้สอนในโรงเรียน"
    - "อาจารย์ผู้สอนในสถาบันอุดมศึกษา"
    - "ผู้บริหารสถาบันอุดมศึกษา"
    - "ผู้บริหารองค์กรวิชาชีพ"
  story: "จากประสบการณ์ตลอดเส้นทางนี้ ผู้จัดทำเห็นว่ายังมีช่องว่างของสาระความรู้และเครื่องมือพื้นฐานบางอย่าง ที่หากทำให้เข้าถึงง่ายขึ้นจะเป็นประโยชน์อย่างมากต่อการเรียนรู้และการดำเนินชีวิตของผู้คน จึงจัดทำ Thamdee ขึ้นเป็นพื้นที่แลกเปลี่ยนสิ่งที่ได้เรียนรู้และพัฒนา และเป็นแหล่งรวมผลงานที่ทำในลักษณะการวิจัยและพัฒนาอย่างต่อเนื่อง เพื่อให้ครู ผู้เรียน ผู้บริหาร และผู้สนใจทั่วไปนำไปใช้ประโยชน์ได้ตามความเหมาะสม"
  hope: "หวังว่างานเหล่านี้จะมีส่วนช่วยสร้างสรรค์และจรรโลงสิ่งดี ๆ ในสังคม รวมถึงเป็นแรงบันดาลใจและกำลังใจให้กับผู้คนอีกหลายกลุ่ม"
  acknowledgement: "ผลงานต่าง ๆ พัฒนาขึ้นโดยใช้ AI เครื่องมือ และแหล่งข้อมูลจากหลายแหล่งช่วยสนับสนุน ขอขอบคุณทุกแหล่งอ้างอิงที่ใช้ในการทำงานไว้ ณ ที่นี้"
  apology: "เนื้อหาและผลงานที่นำเสนออาจมีข้อผิดพลาด คลาดเคลื่อน หรือไม่สมบูรณ์ในบางส่วน ต้องขออภัยไว้ ณ ที่นี้ และหากสะดวก โปรดแจ้งให้ทราบเพื่อการปรับปรุงให้ถูกต้องสมบูรณ์และเกิดประโยชน์สูงสุดต่อไป"
  cta_label: "แจ้งข้อเสนอแนะถึงผู้จัดทำ"

