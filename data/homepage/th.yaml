infographic:
  src: "/images/thamdee-ecosystem-infographic.webp"
  alt: "อินโฟกราฟิก Thamdee Ecosystem — ระบบนิเวศแห่งการเรียนรู้และเทคโนโลยีเพื่อทุกคน ครอบคลุมแอปมือถือ ศูนย์ความรู้ ช่องทางคอนเทนต์ และกลุ่มเป้าหมาย"
  width: 1024
  height: 682

about:
  eyebrow: "เกี่ยวกับ Thamdee"
  heading: "ทำสิ่งดี ให้เกิดประโยชน์จริง"
  lead: "Thamdee เริ่มต้นจากความเชื่อง่าย ๆ ว่า ความรู้และเทคโนโลยีที่ดีควรเข้าถึงได้ทุกคน เราจึงพัฒนาแอป เว็บไซต์ความรู้ และคอนเทนต์ที่เชื่อมโยงกันเป็นระบบนิเวศเดียว เพื่อช่วยให้การเรียนรู้ การทำงาน และชีวิตประจำวันดีขึ้นอย่างเป็นรูปธรรม"
  pillars:
    - title: "ความรู้ที่เชื่อถือได้"
      description: "เนื้อหาทุกชิ้นอ้างอิงหลักการและมาตรฐานที่ตรวจสอบได้ เขียนให้เข้าใจง่าย ไม่โฆษณาเกินจริง"
    - title: "เทคโนโลยีเพื่อทุกคน"
      description: "ออกแบบแอปและเว็บไซต์ให้ใช้ง่าย ตั้งแต่ผู้เรียนยุคใหม่ไปจนถึงผู้สูงวัยที่เพิ่งเริ่มใช้เทคโนโลยี"
    - title: "AI อย่างรับผิดชอบ"
      description: "ใช้ AI ช่วยยกระดับการเรียนรู้ โดยมีคนตรวจสอบความถูกต้อง และเปิดเผยเมื่อ AI มีส่วนในการสร้างเนื้อหา"
    - title: "ประโยชน์ต่อสังคม"
      description: "ทุกโปรเจกต์ตั้งต้นจากคำถามเดียวกัน คือ สิ่งนี้ช่วยให้ชีวิตหรือการศึกษาของใครดีขึ้นบ้าง"

ecosystem:
  eyebrow: "Ecosystem"
  heading: "หนึ่งแบรนด์ แปดโปรเจกต์ เชื่อมถึงกันทั้งหมด"
  lead: "ทุกโปรเจกต์ของ Thamdee ทำงานร่วมกัน แอปช่วยในชีวิตประจำวัน ศูนย์ความรู้ให้ความลึก และคอนเทนต์พาไปต่อยอด เลือกจุดเริ่มต้นที่ตรงกับคุณได้เลย"

apps:
  eyebrow: "Thamdee Apps"
  heading: "แอปที่ช่วยชีวิตประจำวันได้จริง"
  lead: "เราพัฒนาแอปมือถือด้านสุขภาพ การเตือนความจำ การทำงาน และการเรียนรู้ โดยยึดหลักเดียวกันทุกแอป คือ ใช้ง่าย ปลอดภัย และเป็นประโยชน์จริง"
  points:
    - "ออกแบบตัวอักษรและปุ่มให้อ่านง่าย เหมาะกับผู้ใช้ทุกวัย"
    - "เคารพความเป็นส่วนตัว เก็บข้อมูลเท่าที่จำเป็น"
    - "อัปเดตและดูแลต่อเนื่อง พร้อมช่องทางแจ้งปัญหาโดยตรง"
  cta:
    label: "ดูแอปทั้งหมดที่ app.thamdee.com"
    url: "https://app.thamdee.com"
  disclaimer: "แอปด้านสุขภาพและการเตือนความจำเป็นเครื่องมือช่วยอำนวยความสะดวก ไม่ใช่เครื่องมือทางการแพทย์ และไม่ทดแทนคำแนะนำจากแพทย์"

knowledge:
  eyebrow: "Knowledge Hubs"
  heading: "ศูนย์ความรู้สำหรับคนการศึกษา"
  lead: "แหล่งความรู้เฉพาะทางที่จัดระบบไว้ให้ค้นง่าย อ้างอิงได้ และนำไปใช้ในงานจริง ครอบคลุมวิชาชีพครู การบริหารสถานศึกษา กฎหมายการศึกษา และการศึกษาเพื่อพลเมืองโลก"

content:
  eyebrow: "Content Channels"
  heading: "เรียนรู้ในแบบที่คุณสะดวก"
  lead: "อยากดูแบบเจาะลึกไปที่ YouTube อยากรู้เร็ว ๆ ไปที่ TikTok อยากอ่านและเก็บไว้อ้างอิงไปที่ Thamdee Hub ทุกช่องทางคัดกรองเนื้อหาด้วยมาตรฐานเดียวกัน"

why:
  eyebrow: "Why Thamdee"
  heading: "ทำไมจึงวางใจ Thamdee ได้"
  items:
    - title: "โปร่งใสเรื่องที่มา"
      description: "บอกชัดว่าเนื้อหาแต่ละชิ้นอ้างอิงจากอะไร และเปิดช่องทางให้แจ้งแก้ไขเมื่อพบข้อผิดพลาด"
    - title: "ยึดผู้ใช้เป็นศูนย์กลาง"
      description: "ทุกการออกแบบเริ่มจากคำถามว่าผู้ใช้จริงจะเข้าใจและใช้งานได้หรือไม่ รวมถึงผู้สูงวัยและผู้เริ่มต้น"
    - title: "พัฒนาต่อเนื่อง"
      description: "Ecosystem เติบโตทีละก้าวอย่างมีทิศทาง แอปใหม่ ศูนย์ความรู้ใหม่ และคอนเทนต์ใหม่ถูกเพิ่มอย่างสม่ำเสมอ"

follow:
  eyebrow: "ติดตาม Thamdee"
  heading: "ไม่พลาดสิ่งดี ๆ ที่กำลังจะมา"
  lead: "ติดตามช่องทางของเราเพื่อรับความรู้ใหม่ วิดีโอใหม่ และข่าวการเปิดตัวแอปหรือศูนย์ความรู้ใหม่ก่อนใคร"
  youtube: "ติดตามบน YouTube"
  tiktok: "ติดตามบน TikTok"
  hub: "อ่านบทความที่ Hub"

news:
  eyebrow: "ข่าวสาร"
  heading: "ข่าวสารล่าสุด"
  lead: "ประกาศการเปิดตัวแอป ศูนย์ความรู้ใหม่ และอัปเดตสำคัญจาก Thamdee Ecosystem"
  cta:
