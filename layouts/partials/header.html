      {{ partial "logo.html" . }}
      <span class="brand-text">Thamdee<span class="brand-dot">.</span></span>

      <span class="nav-toggle-bar" aria-hidden="true"></span>
      <span class="nav-toggle-label">เมนู</span>
    </button>

    <nav id="site-nav" class="site-nav" aria-label="เมนูหลัก">

        {{ range site.Menus.main }}
