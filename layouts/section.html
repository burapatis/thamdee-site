{{ define "main" }}
<section class="section section-alt">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="lead">{{ . }}</p>{{ end }}
    <ul role="list">
      {{ range .Pages.ByDate.Reverse }}
      <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  </div>
</section>
{{ end }}
