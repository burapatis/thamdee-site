{{ define "main" }}
{{- $hp := index hugo.Data.homepage "th" -}}
<article class="section legal-page">
  <div class="container container-narrow">
    <p class="eyebrow">Thamdee Ecosystem</p>
    <h1>{{ .Title }}</h1>
    {{ with .Params.updated }}<p class="legal-updated">อัปเดตล่าสุด: {{ . }}</p>{{ end }}
    <p class="legal-lang-note" lang="en">{{ $hp.legal_note }}</p>
    <div class="prose">
      {{ .Content }}
    </div>
    <p><a class="card-link" href="/">← {{ $hp.ui.back_home }}</a></p>
  </div>
</article>
{{ end }}
