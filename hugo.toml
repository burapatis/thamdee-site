baseURL = "https://thamdee.com/"
locale = "th-TH"
defaultContentLanguage = "th"
title = "Thamdee Ecosystem — ระบบนิเวศแห่งการเรียนรู้ เทคโนโลยี และสิ่งดี ๆ"
enableRobotsTXT = false # ใช้ static/robots.txt ของเราเอง
timeZone = "Asia/Bangkok"

# ปิด taxonomy/term ที่ยังไม่ใช้ — section และ rss เปิดเฉพาะ news ผ่าน [outputs]
disableKinds = ["taxonomy", "term"]

[outputs]
  home = ["HTML"]
  page = ["HTML"]
  section = ["HTML"]

[pagination]
  pagerSize = 12

[params]
  siteName = "Thamdee Ecosystem"
  shortName = "Thamdee"
  description = "Thamdee Ecosystem คือระบบนิเวศของการเรียนรู้ เทคโนโลยี และคอนเทนต์ รวมแอปมือถือ ศูนย์ความรู้สำหรับครู ผู้บริหาร กฎหมายการศึกษา และคอนเทนต์ AI ไว้ในที่เดียว"
  ogHomeTitle = "Thamdee Ecosystem — เรียนรู้ เทคโนโลยี และสิ่งดี ๆ ในที่เดียว"
  tagline_th = "ทำสิ่งดี ให้เกิดประโยชน์จริง"
  tagline_en = "Good things, made truly useful."
  contactEmail = "burapatis@gmail.com"
  ogImage = "/images/og-cover.png"
  youtube = "https://media.thamdee.com"
  tiktok = "https://media.thamdee.com"
  foundingYear = 2024
  cloudflareAnalyticsToken = ""

[menus]
  [[menus.main]]
    name = "หน้าแรก"
    url = "/"
    weight = 10
  [[menus.main]]
    name = "Ecosystem"
    url = "/#ecosystem"
    weight = 20
  [[menus.main]]
    name = "แอป"
    url = "/#apps"
    weight = 30
  [[menus.main]]
    name = "ศูนย์ความรู้"
    url = "/#knowledge"
    weight = 40
  [[menus.main]]
    name = "คอนเทนต์"
    url = "/#content"
    weight = 50
  [[menus.main]]
    name = "เกี่ยวกับ"
    url = "/#about"
    weight = 60
  [[menus.main]]
    name = "ข่าวสาร"
    url = "/news/"
    weight = 65
  [[menus.main]]
    name = "ค้นหา"
    url = "/search/"
    weight = 67
  [[menus.main]]
    name = "ติดต่อ"
    url = "/#contact"
    weight = 70

[markup.goldmark.renderer]
  unsafe = false

[minify]
  minifyOutput = true
