    name = "แอป"
    url = "/#apps"
    weight = 30
  [[languages.th.menus.main]]
    name = "ศูนย์ความรู้"
    url = "/#knowledge"
    weight = 40
  [[languages.th.menus.main]]
    name = "คอนเทนต์"
    url = "/#content"
    weight = 50
  [[languages.th.menus.main]]
