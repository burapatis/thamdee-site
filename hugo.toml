    weight = 60
  [[languages.th.menus.main]]
    name = "ข่าวสาร"
    url = "/news/"
    weight = 65
  [[languages.th.menus.main]]
    name = "ค้นหา"
    url = "/search/"
    weight = 67
  [[languages.th.menus.main]]
    name = "ติดต่อ"
