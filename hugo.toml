baseURL = "https://thamdee.com/"
locale = "th-TH"
defaultContentLanguage = "th"
title = "Thamdee Ecosystem — ระบบนิเวศแห่งการเรียนรู้ เทคโนโลยี และสิ่งดี ๆ"
enableRobotsTXT = false # ใช้ static/robots.txt ของเราเอง
timeZone = "Asia/Bangkok"

# ปิด taxonomy/term ที่ยังไม่ใช้ — section และ rss เปิดเฉพาะ news ผ่าน [outputs]
disableKinds = ["taxonomy", "term"]

[outputs]
  home = ["HTML"]
  page = ["HTML"]
  section = ["HTML"]

[pagination]
  pagerSize = 12

[params]
  siteName = "Thamdee Ecosystem"
  shortName = "Thamdee"
  description = "Thamdee Ecosystem คือระบบนิเวศของการเรียนรู้ เทคโนโลยี และคอนเทนต์ รวมแอปมือถือ ศูนย์ความรู้สำหรับครู ผู้บริหาร กฎหมายการศึกษา และคอนเทนต์ AI ไว้ในที่เดียว"
  ogHomeTitle = "Thamdee Ecosystem — เรียนรู้ เทคโนโลยี และสิ่งดี ๆ ในที่เดียว"
  tagline_th = "ทำสิ่งดี ให้เกิดประโยชน์จริง"
  tagline_en = "Good things, made truly useful."
  contactEmail = "burapatis@gmail.com"
  ogImage = "/images/og-cover.png"
  youtube = "https://media.thamdee.com"
  tiktok = "https://media.thamdee.com"
  foundingYear = 2024
  # Cloudflare Web Analytics — beacon (ตั้ง token จาก Dashboard → Web Analytics → Manage site)
  cloudflareAnalyticsToken = "f3297380289b48dbb76c9fdd787ba2aa"
  # แสดงตัวนับผู้เข้าชมใน footer เมื่อ data/analytics.yaml มีค่า visits (ดึงจาก GraphQL ตอน deploy)
  showVisitorCount = true

[menus]
  [[menus.main]]
    identifier = "ecosystem"
    name = "Ecosystem"
    url = "/#ecosystem"
    weight = 20
  [[menus.main]]
    parent = "ecosystem"
    name = "แอปมือถือ"
    url = "/#apps"
    weight = 21
  [[menus.main]]
    parent = "ecosystem"
    name = "ศูนย์ความรู้"
    url = "/#knowledge"
    weight = 22
  [[menus.main]]
    parent = "ecosystem"
    name = "คอนเทนต์ & สื่อ"
    url = "/#content"
    weight = 23
  [[menus.main]]
    parent = "ecosystem"
    name = "Thamdee Hub"
    url = "https://hub.thamdee.com"
    weight = 24
  [[menus.main]]
    name = "ข่าวสาร"
    url = "/news/"
    weight = 30
  [[menus.main]]
    name = "เกี่ยวกับ"
    url = "/#about"
    weight = 40

[markup.goldmark.renderer]
  unsafe = false

[minify]
  minifyOutput = true
