# Deploy เว็บไซต์ Hugo ขึ้น GitHub Pages อัตโนมัติทุกครั้งที่ push ไปที่ branch main
name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.163.3"
    steps:
      - name: Install Hugo (extended)
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Build search index (Pagefind)
        run: npx --yes pagefind@latest --site public

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry Pages deploy after transient failure
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Verify Pages deploy succeeded
        run: |
          if [ "${{ steps.deployment.outcome }}" = "success" ] || [ "${{ steps.deployment_retry.outcome }}" = "success" ]; then
            echo "Pages deploy OK"
          else
            echo "GitHub Pages deploy failed after retry."
            exit 1
          fi

  sync-hub:
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      # ต้องตั้ง secret HUB_DISPATCH_TOKEN ใน repo thamdee-site
      # (PAT ที่มีสิทธิ์ actions:write บน burapatis/thamdee-hub)
      - name: Trigger thamdee-hub rebuild
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.HUB_DISPATCH_TOKEN }}
          repository: burapatis/thamdee-hub
          event-type: thamdee-site-deployed
